services:
  metabase-db:
    image: postgres:16-alpine
    container_name: metabase-db
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${MB_POSTGRES_USER}
      POSTGRES_PASSWORD: ${MB_POSTGRES_PASSWORD}
      POSTGRES_DB: ${MB_POSTGRES_DB}
    volumes:
      - metabase_pgdata:/var/lib/postgresql/data
    networks:
      - metabase-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MB_POSTGRES_USER} -d ${MB_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    restart: always
    ports:
      - "127.0.0.1:3001:3000"
    env_file: .env
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: metabase-db
      MB_DB_PORT: 5432
      MB_DB_DBNAME: ${MB_POSTGRES_DB}
      MB_DB_USER: ${MB_POSTGRES_USER}
      MB_DB_PASS: ${MB_POSTGRES_PASSWORD}
      JAVA_TIMEZONE: America/Montevideo
    depends_on:
      metabase-db:
        condition: service_healthy
    networks:
      - metabase-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

networks:
  metabase-net:
    driver: bridge

volumes:
  metabase_pgdata:
